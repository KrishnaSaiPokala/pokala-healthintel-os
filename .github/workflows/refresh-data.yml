name: Refresh Public Intelligence Snapshot
on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/overnight_run.py --profile demo --max-stage-seconds 2
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pokala-healthintel-run
          path: |
            .run/
            data/public/
            apps/web/src/data/intelligence.json
